services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "10"
      RAM_SIZE: "16G"
      CPU_CORES: "4"
      LANGUAGE: "Turkish"
      KEYBOARD: "tr"
      DISK_SIZE: "256G"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
    volumes:
      - ./windows:/storage
    restart: always
    stop_grace_period: 2m

  guacamole:
    image: oznu/guacamole
    container_name: rdp_web
    ports:
      - 8080:8080
    environment:
      - EXT_USER=Docker
      - EXT_PASS=admin
      - RDP_HOST=windows
      - RDP_PORT=3389
      - RDP_USER=Docker
      - RDP_PASS=admin
      - RDP_SECURITY=any
      - RDP_IGNORE_CERT=true
    depends_on:
      - windows
